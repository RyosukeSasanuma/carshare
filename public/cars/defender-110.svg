<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="Land Rover Defender 110">
  <defs>
    <linearGradient id="df-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1c20"/>
      <stop offset="1" stop-color="#0b0c0e"/>
    </linearGradient>
    <linearGradient id="df-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3f4a44"/>
      <stop offset="0.5" stop-color="#333c37"/>
      <stop offset="1" stop-color="#242b27"/>
    </linearGradient>
    <linearGradient id="df-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4048"/>
      <stop offset="1" stop-color="#15181c"/>
    </linearGradient>
    <radialGradient id="df-glow" cx="0.5" cy="0.85" r="0.6">
      <stop offset="0" stop-color="#c8a45c" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#c8a45c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="url(#df-bg)"/>
  <ellipse cx="400" cy="430" rx="360" ry="70" fill="url(#df-glow)"/>
  <line x1="60" y1="405" x2="740" y2="405" stroke="#c8a45c" stroke-opacity="0.15" stroke-width="1"/>

  <!-- boxy SUV silhouette -->
  <g>
    <path d="M140 250
             L140 236 C140 230 145 226 151 226
             L300 226 L320 214 L520 214 L540 226
             L660 226 C666 226 672 230 672 236
             L672 360 C672 368 666 374 658 374
             L152 374 C144 374 140 368 140 360 Z"
          fill="url(#df-body)" stroke="#1a1f1c" stroke-width="1.5"/>

    <!-- roof line -->
    <rect x="150" y="220" width="520" height="8" rx="3" fill="#20261f"/>

    <!-- windows -->
    <rect x="170" y="240" width="150" height="70" rx="4" fill="url(#df-glass)"/>
    <rect x="336" y="240" width="150" height="70" rx="4" fill="url(#df-glass)"/>
    <rect x="502" y="240" width="150" height="70" rx="4" fill="url(#df-glass)"/>
    <line x1="326" y1="238" x2="326" y2="312" stroke="#20261f" stroke-width="6"/>
    <line x1="492" y1="238" x2="492" y2="312" stroke="#20261f" stroke-width="6"/>

    <!-- gold body accent line -->
    <path d="M148 336 L664 336" stroke="#c8a45c" stroke-width="2" opacity="0.65"/>

    <!-- front detail -->
    <rect x="646" y="300" width="26" height="30" rx="3" fill="#c8a45c" opacity="0.5"/>
    <!-- side hinge hints -->
    <circle cx="405" cy="252" r="3" fill="#c8a45c" opacity="0.5"/>
    <circle cx="405" cy="300" r="3" fill="#c8a45c" opacity="0.5"/>
  </g>

  <!-- rugged wheels -->
  <g>
    <circle cx="248" cy="374" r="58" fill="#0b0c0e" stroke="#2a2d31" stroke-width="3"/>
    <circle cx="248" cy="374" r="34" fill="#17191c" stroke="#c8a45c" stroke-width="1.5" stroke-opacity="0.6"/>
    <circle cx="248" cy="374" r="9" fill="#c8a45c" opacity="0.85"/>
    <g stroke="#4a4e53" stroke-width="6">
      <line x1="248" y1="340" x2="248" y2="408"/>
      <line x1="214" y1="374" x2="282" y2="374"/>
      <line x1="224" y1="350" x2="272" y2="398"/>
      <line x1="272" y1="350" x2="224" y2="398"/>
    </g>

    <circle cx="562" cy="374" r="58" fill="#0b0c0e" stroke="#2a2d31" stroke-width="3"/>
    <circle cx="562" cy="374" r="34" fill="#17191c" stroke="#c8a45c" stroke-width="1.5" stroke-opacity="0.6"/>
    <circle cx="562" cy="374" r="9" fill="#c8a45c" opacity="0.85"/>
    <g stroke="#4a4e53" stroke-width="6">
      <line x1="562" y1="340" x2="562" y2="408"/>
      <line x1="528" y1="374" x2="596" y2="374"/>
      <line x1="538" y1="350" x2="586" y2="398"/>
      <line x1="586" y1="350" x2="538" y2="398"/>
    </g>
  </g>

  <!-- captions -->
  <text x="60" y="70" fill="#c8a45c" font-family="Georgia, 'Times New Roman', serif" font-size="15" letter-spacing="6">LAND ROVER</text>
  <text x="60" y="108" fill="#f4f2ec" font-family="Georgia, 'Times New Roman', serif" font-size="34" letter-spacing="2">DEFENDER 110</text>
</svg>
