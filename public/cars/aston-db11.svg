<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="800" height="500" role="img" aria-label="Aston Martin DB11">
  <defs>
    <linearGradient id="db-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1c20"/>
      <stop offset="1" stop-color="#0b0c0e"/>
    </linearGradient>
    <linearGradient id="db-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.45" stop-color="#eef0f2"/>
      <stop offset="1" stop-color="#c4c8cd"/>
    </linearGradient>
    <linearGradient id="db-glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4048"/>
      <stop offset="1" stop-color="#15181c"/>
    </linearGradient>
    <radialGradient id="db-glow" cx="0.5" cy="0.85" r="0.6">
      <stop offset="0" stop-color="#c8a45c" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#c8a45c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="800" height="500" fill="url(#db-bg)"/>
  <ellipse cx="400" cy="430" rx="360" ry="70" fill="url(#db-glow)"/>

  <!-- floor reflection line -->
  <line x1="60" y1="400" x2="740" y2="400" stroke="#c8a45c" stroke-opacity="0.15" stroke-width="1"/>

  <!-- car body: low grand tourer silhouette -->
  <g>
    <path d="M120 360
             C120 330 160 320 210 316
             C250 262 330 236 420 236
             C520 236 590 262 636 312
             C684 316 700 330 700 360
             L700 372 C700 380 694 386 686 386
             L134 386 C126 386 120 380 120 372 Z"
          fill="url(#db-body)" stroke="#9aa0a6" stroke-width="1"/>

    <!-- greenhouse / windows -->
    <path d="M268 258 C300 232 360 224 420 224
             C486 224 548 236 588 274
             L558 300 C520 274 470 268 420 268
             C368 268 320 276 292 300 Z"
          fill="url(#db-glass)" opacity="0.92"/>
    <line x1="430" y1="228" x2="430" y2="292" stroke="#0b0c0e" stroke-width="3" opacity="0.5"/>

    <!-- side crease / gold accent -->
    <path d="M150 350 C300 340 500 340 690 350" fill="none" stroke="#c8a45c" stroke-width="2" opacity="0.7"/>

    <!-- hood vent hint -->
    <path d="M636 330 l40 6" stroke="#9aa0a6" stroke-width="2" opacity="0.6"/>
  </g>

  <!-- wheels -->
  <g>
    <circle cx="250" cy="388" r="52" fill="#0b0c0e" stroke="#2a2d31" stroke-width="2"/>
    <circle cx="250" cy="388" r="30" fill="#17191c" stroke="#c8a45c" stroke-width="1.5" stroke-opacity="0.6"/>
    <circle cx="250" cy="388" r="8" fill="#c8a45c" opacity="0.85"/>
    <g stroke="#5a5e63" stroke-width="2">
      <line x1="250" y1="360" x2="250" y2="416"/>
      <line x1="222" y1="388" x2="278" y2="388"/>
      <line x1="231" y1="369" x2="269" y2="407"/>
      <line x1="269" y1="369" x2="231" y2="407"/>
    </g>

    <circle cx="560" cy="388" r="52" fill="#0b0c0e" stroke="#2a2d31" stroke-width="2"/>
    <circle cx="560" cy="388" r="30" fill="#17191c" stroke="#c8a45c" stroke-width="1.5" stroke-opacity="0.6"/>
    <circle cx="560" cy="388" r="8" fill="#c8a45c" opacity="0.85"/>
    <g stroke="#5a5e63" stroke-width="2">
      <line x1="560" y1="360" x2="560" y2="416"/>
      <line x1="532" y1="388" x2="588" y2="388"/>
      <line x1="541" y1="369" x2="579" y2="407"/>
      <line x1="579" y1="369" x2="541" y2="407"/>
    </g>
  </g>

  <!-- captions -->
  <text x="60" y="70" fill="#c8a45c" font-family="Georgia, 'Times New Roman', serif" font-size="15" letter-spacing="6">ASTON MARTIN</text>
  <text x="60" y="108" fill="#f4f2ec" font-family="Georgia, 'Times New Roman', serif" font-size="34" letter-spacing="2">DB11 · V12</text>
</svg>
